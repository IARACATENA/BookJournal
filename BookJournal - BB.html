<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeyondBooks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #1A1A1A;
      --white: #FDFAF4;
      --beige: #F5F0E8;
      --beige-mid: #E8E0D0;
      --beige-dark: #D4C5A0;
      --gray: #888;
      --gray-light: #AAAAAA;
      --gray-border: #C8BFA8;
      --serif-display: 'DM Serif Display', Georgia, serif;
      --serif-body: 'IM Fell English', Georgia, serif;
      --serif-title: 'Playfair Display', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--beige);
      color: var(--black);
      font-family: var(--serif-body);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--beige); }
    ::-webkit-scrollbar-thumb { background: var(--black); }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--black);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
    }

    .logo {
      font-family: var(--serif-display);
      font-size: 20px;
      color: var(--beige);
      letter-spacing: 0.04em;
      padding: 18px 0;
      cursor: pointer;
    }
    .logo em { font-style: italic; color: var(--beige-dark); }

    nav { display: flex; }
    .nav-btn {
      background: transparent;
      color: var(--beige-dark);
      border: none;
      border-left: 1px solid #333;
      padding: 20px 20px;
      font-family: var(--serif-body);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: #2A2A2A; color: var(--beige); }
    .nav-btn.active { background: var(--beige); color: var(--black); }
    .nav-btn.danger { color: #888; }
    .nav-btn.danger:hover { background: #2A0000; color: #E08080; }

    /* ── MAIN ── */
    main { max-width: 1080px; margin: 0 auto; padding: 48px 32px; }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--black);
      margin-bottom: 48px;
    }
    .stat {
      padding: 28px 24px;
      border-right: 1px solid var(--black);
      text-align: center;
      background: var(--white);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: var(--serif-display);
      font-size: 40px;
      font-style: italic;
      color: var(--black);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-family: var(--serif-body);
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.06em;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px;
      font-family: var(--serif-body);
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.15em;
    }
    .rule { flex: 1; height: 1px; background: var(--black); opacity: 0.15; }

    /* ── FILTERS ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 28px; align-items: center;
    }
    .search-input {
      background: var(--white);
      border: 1px solid var(--black);
      color: var(--black);
      padding: 8px 14px;
      font-family: var(--serif-body);
      font-size: 13px;
      outline: none;
      min-width: 200px;
    }
    .search-input::placeholder { color: var(--gray-light); font-style: italic; }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--gray-border);
      color: var(--gray);
      padding: 6px 13px;
      font-family: var(--serif-body);
      font-size: 11px;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-btn.active { background: var(--black); border-color: var(--black); color: var(--beige); }

    .sort-select {
      background: var(--white);
      border: 1px solid var(--gray-border);
      color: var(--gray);
      padding: 6px 13px;
      font-family: var(--serif-body);
      font-size: 11px;
      letter-spacing: 0.07em;
      cursor: pointer;
      outline: none;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      border: 1px solid var(--black);
    }
    .book-card {
      background: var(--white);
      padding: 26px 24px;
      border-right: 1px solid var(--beige-mid);
      border-bottom: 1px solid var(--beige-mid);
      cursor: pointer;
      transition: background 0.18s;
    }
    .book-card:hover { background: var(--beige); }

    .card-status {
      font-family: var(--serif-body);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--gray);
      margin-bottom: 14px;
    }
    .card-title {
      font-family: var(--serif-title);
      font-size: 16px;
      font-style: italic;
      color: var(--black);
      line-height: 1.35;
      margin-bottom: 6px;
    }
    .card-author {
      font-family: var(--serif-body);
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }
    .stars { display: flex; gap: 3px; margin-bottom: 10px; }
    .star { font-size: 13px; color: var(--beige-mid); cursor: pointer; transition: color 0.1s; user-select: none; }
    .star.filled { color: var(--black); }
    .star.interactive:hover { color: var(--black); }

    .card-genre {
      font-family: var(--serif-body);
      font-size: 10px;
      color: var(--gray-light);
      letter-spacing: 0.1em;
    }
    .card-snippet {
      margin-top: 12px;
      font-size: 11px;
      color: var(--gray-light);
      font-style: italic;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--gray-light);
      font-style: italic;
      font-size: 17px;
    }
    .empty-link { color: var(--black); cursor: pointer; text-decoration: underline; }

    /* ── FORM ── */
    .form-wrap {
      background: var(--white);
      border: 1px solid var(--black);
      padding: 44px;
    }
    .form-heading {
      font-family: var(--serif-display);
      font-size: 30px;
      font-style: italic;
      color: var(--black);
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-family: var(--serif-body);
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 0.16em;
    }
    input[type="text"], input[type="number"], input[type="date"], input[type="url"] {
      background: var(--beige);
      border: none;
      border-bottom: 1px solid var(--black);
      color: var(--black);
      padding: 10px 2px;
      font-family: var(--serif-body);
      font-size: 14px;
      outline: none;
      transition: border-bottom-width 0.15s;
      width: 100%;
    }
    input:focus { border-bottom-width: 2px; }
    input::placeholder { color: var(--gray-border); font-style: italic; }

    select.form-select {
      background: var(--beige);
      border: none;
      border-bottom: 1px solid var(--black);
      color: var(--black);
      padding: 10px 2px;
      font-family: var(--serif-body);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      appearance: none;
      width: 100%;
    }

    textarea {
      background: var(--beige);
      border: 1px solid var(--gray-border);
      color: var(--black);
      padding: 12px;
      font-family: var(--serif-body);
      font-size: 14px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      line-height: 1.7;
      transition: border-color 0.2s;
      width: 100%;
    }
    textarea:focus { border-color: var(--black); }
    textarea::placeholder { color: var(--gray-border); font-style: italic; }

    .form-stars { display: flex; gap: 5px; }
    .form-star {
      font-size: 22px;
      color: var(--beige-mid);
      cursor: pointer;
      transition: color 0.1s;
      user-select: none;
    }
    .form-star.filled { color: var(--black); }

    .form-actions { display: flex; gap: 12px; margin-top: 12px; }
    .btn-primary {
      background: var(--black);
      color: var(--beige);
      border: none;
      padding: 13px 32px;
      font-family: var(--serif-body);
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--gray);
      border: 1px solid var(--gray-border);
      padding: 13px 24px;
      font-family: var(--serif-body);
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--black); color: var(--black); }

    /* ── DETAIL ── */
    .detail-header {
      background: var(--black);
      color: var(--beige);
      padding: 44px;
      margin-bottom: 1px;
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 36px;
      align-items: start;
    }
    .cover-box {
      width: 90px; height: 126px;
      background: #2A2A2A;
      border: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .cover-box img { width: 100%; height: 100%; object-fit: cover; }

    .detail-title {
      font-family: var(--serif-title);
      font-size: 34px;
      font-style: italic;
      color: var(--beige);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .detail-author {
      font-family: var(--serif-body);
      font-size: 15px;
      color: var(--beige-dark);
      font-style: italic;
      margin-bottom: 18px;
    }
    .detail-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .badge {
      font-family: var(--serif-body);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--beige-dark);
      border: 1px solid #444;
      padding: 3px 10px;
    }
    .detail-dates {
      font-family: var(--serif-body);
      font-size: 11px;
      color: var(--gray);
      margin-top: 10px;
      letter-spacing: 0.06em;
    }
    .detail-stars .star { color: #444; }
    .detail-stars .star.filled { color: var(--beige-dark); }

    .detail-section {
      background: var(--white);
      border: 1px solid var(--beige-mid);
      border-top: none;
      padding: 32px 44px;
    }
    .section-head {
      font-family: var(--serif-body);
      font-size: 10px;
      color: var(--gray-light);
      letter-spacing: 0.2em;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--beige-mid);
    }
    .quote-block {
      border-left: 2px solid var(--black);
      padding-left: 22px;
      font-family: var(--serif-title);
      font-style: italic;
      font-size: 19px;
      color: var(--black);
      line-height: 1.65;
    }
    .prose {
      font-family: var(--serif-body);
      font-size: 15px;
      line-height: 1.85;
      color: #333;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      main { padding: 24px 16px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .form-wrap { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-header { grid-template-columns: 1fr; padding: 28px 24px; }
      .cover-box { display: none; }
      .detail-section { padding: 24px; }
      .nav-btn { padding: 18px 14px; font-size: 11px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="showLibrary()">BeyondBooks</div>
  <nav id="nav-library">
    <button class="nav-btn active" onclick="showLibrary()">Biblioteca</button>
    <button class="nav-btn" onclick="showForm(null)">+ Nuevo</button>
  </nav>
  <nav id="nav-detail" style="display:none">
    <button class="nav-btn" onclick="showLibrary()">← Biblioteca</button>
    <button class="nav-btn" onclick="editCurrent()">Editar</button>
    <button class="nav-btn danger" onclick="deleteCurrent()">Eliminar</button>
  </nav>
  <nav id="nav-form" style="display:none">
    <button class="nav-btn" onclick="cancelForm()">← Cancelar</button>
  </nav>
</header>

<main>
  <!-- LIBRARY VIEW -->
  <div id="view-library" class="view active">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">en biblioteca</div></div>
      <div class="stat"><div class="stat-num" id="s-finished">0</div><div class="stat-label">leídos</div></div>
      <div class="stat"><div class="stat-num" id="s-reading">0</div><div class="stat-label">leyendo</div></div>
      <div class="stat"><div class="stat-num" id="s-avg">–</div><div class="stat-label">puntuación media</div></div>
    </div>

    <div class="section-label">
      <div class="rule"></div>
      <span>Tu colección</span>
      <div class="rule"></div>
    </div>

    <div class="filters">
      <input class="search-input" type="text" id="search-input" placeholder="Buscar título o autor..." oninput="renderGrid()" />
      <button class="filter-btn active" data-status="all" onclick="setFilter(this,'all')">Todos</button>
      <button class="filter-btn" data-status="reading" onclick="setFilter(this,'reading')">Leyendo</button>
      <button class="filter-btn" data-status="finished" onclick="setFilter(this,'finished')">Terminado</button>
      <button class="filter-btn" data-status="pending" onclick="setFilter(this,'pending')">Por leer</button>
      <button class="filter-btn" data-status="abandoned" onclick="setFilter(this,'abandoned')">Abandonado</button>
      <select class="sort-select" id="sort-select" onchange="renderGrid()">
        <option value="recent">Más recientes</option>
        <option value="rating">Mejor puntuación</option>
        <option value="title">Título A–Z</option>
        <option value="author">Autor A–Z</option>
      </select>
    </div>

    <div id="grid-container"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="view-form" class="view">
    <div class="form-wrap">
      <div class="form-heading" id="form-heading">Nuevo libro</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>TÍTULO *</label>
          <input type="text" id="f-title" placeholder="El nombre de la rosa" />
        </div>
        <div class="form-group">
          <label>AUTOR *</label>
          <input type="text" id="f-author" placeholder="Umberto Eco" />
        </div>
        <div class="form-group">
          <label>PÁGINAS</label>
          <input type="number" id="f-pages" placeholder="502" />
        </div>
        <div class="form-group">
          <label>GÉNERO</label>
          <select class="form-select" id="f-genre">
            <option value="">— Seleccionar —</option>
            <option>Ficción</option><option>No ficción</option><option>Ensayo</option>
            <option>Poesía</option><option>Historia</option><option>Ciencia</option>
            <option>Filosofía</option><option>Clásicos</option><option>Contemporáneo</option><option>Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>ESTADO</label>
          <select class="form-select" id="f-status">
            <option value="reading">◐ Leyendo</option>
            <option value="finished">● Terminado</option>
            <option value="pending">○ Por leer</option>
            <option value="abandoned">◌ Abandonado</option>
          </select>
        </div>
        <div class="form-group">
          <label>INICIO</label>
          <input type="date" id="f-start" />
        </div>
        <div class="form-group">
          <label>FIN</label>
          <input type="date" id="f-end" />
        </div>
        <div class="form-group full">
          <label>CALIFICACIÓN</label>
          <div class="form-stars" id="form-stars">
            <span class="form-star" data-v="1" onclick="setRating(1)">★</span>
            <span class="form-star" data-v="2" onclick="setRating(2)">★</span>
            <span class="form-star" data-v="3" onclick="setRating(3)">★</span>
            <span class="form-star" data-v="4" onclick="setRating(4)">★</span>
            <span class="form-star" data-v="5" onclick="setRating(5)">★</span>
          </div>
        </div>
        <div class="form-group full">
          <label>CITA FAVORITA</label>
          <textarea id="f-quote" placeholder="Una frase que te haya marcado..."></textarea>
        </div>
        <div class="form-group full">
          <label>RESEÑA PERSONAL</label>
          <textarea id="f-review" style="min-height:130px" placeholder="¿Qué te pareció? ¿Lo recomendarías?"></textarea>
        </div>
        <div class="form-group full">
          <label>NOTAS</label>
          <textarea id="f-notes" placeholder="Ideas, personajes, lo que quieras recordar..."></textarea>
        </div>
        <div class="form-group full">
          <label>URL DE PORTADA</label>
          <input type="url" id="f-cover" placeholder="https://..." />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="form-submit" onclick="submitForm()">Agregar libro</button>
        <button class="btn-secondary" onclick="cancelForm()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="view">
    <div class="detail-header">
      <div class="cover-box" id="d-cover">📖</div>
      <div>
        <div class="detail-title" id="d-title"></div>
        <div class="detail-author" id="d-author"></div>
        <div class="detail-meta" id="d-meta"></div>
        <div class="detail-stars stars" id="d-stars"></div>
        <div class="detail-dates" id="d-dates"></div>
      </div>
    </div>
    <div id="d-quote-section" class="detail-section" style="display:none">
      <div class="section-head">CITA DESTACADA</div>
      <div class="quote-block" id="d-quote"></div>
    </div>
    <div id="d-review-section" class="detail-section" style="display:none">
      <div class="section-head">RESEÑA PERSONAL</div>
      <div class="prose" id="d-review"></div>
    </div>
    <div id="d-notes-section" class="detail-section" style="display:none">
      <div class="section-head">NOTAS</div>
      <div class="prose" id="d-notes"></div>
    </div>
    <div id="d-empty-section" class="detail-section" style="text-align:center;color:#AAAAAA;font-style:italic;padding:40px;display:none">
      Sin notas aún. <span class="empty-link" onclick="editCurrent()">Agregar →</span>
    </div>
  </div>
</main>

<script>
  const STORAGE_KEY = "beyondbooks-v1";
  let books = [];
  let currentId = null;
  let formRating = 0;
  let isEditing = false;
  let activeFilter = "all";

  const STATUS = {
    reading:   { label: "Leyendo",    icon: "◐" },
    finished:  { label: "Terminado",  icon: "●" },
    pending:   { label: "Por leer",   icon: "○" },
    abandoned: { label: "Abandonado", icon: "◌" },
  };

  /* ── STORAGE ── */
  async function load() {
    try {
      const r = await window.storage.get(STORAGE_KEY);
      if (r?.value) books = JSON.parse(r.value);
    } catch { books = []; }
    renderGrid();
    updateStats();
  }

  async function persist() {
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(books)); } catch {}
  }

  /* ── VIEWS ── */
  function showView(name) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById("view-" + name).classList.add("active");
    document.getElementById("nav-library").style.display = name === "library" ? "flex" : "none";
    document.getElementById("nav-detail").style.display  = name === "detail"  ? "flex" : "none";
    document.getElementById("nav-form").style.display    = name === "form"    ? "flex" : "none";
    window.scrollTo(0, 0);
  }

  function showLibrary() {
    isEditing = false;
    showView("library");
    renderGrid();
    updateStats();
  }

  /* ── STATS ── */
  function updateStats() {
    document.getElementById("s-total").textContent    = books.length;
    document.getElementById("s-finished").textContent = books.filter(b => b.status === "finished").length;
    document.getElementById("s-reading").textContent  = books.filter(b => b.status === "reading").length;
    const rated = books.filter(b => b.rating);
    document.getElementById("s-avg").textContent = rated.length
      ? (rated.reduce((s, b) => s + b.rating, 0) / rated.length).toFixed(1)
      : "–";
  }

  /* ── FILTER ── */
  function setFilter(btn, status) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = status;
    renderGrid();
  }

  /* ── GRID ── */
  function starsHtml(rating, cls) {
    return [1,2,3,4,5].map(s =>
      `<span class="star ${cls || ""} ${s <= rating ? "filled" : ""}" >★</span>`
    ).join("");
  }

  function renderGrid() {
    const search  = (document.getElementById("search-input")?.value || "").toLowerCase();
    const sortBy  = document.getElementById("sort-select")?.value || "recent";

    let filtered = books
      .filter(b => activeFilter === "all" || b.status === activeFilter)
      .filter(b => !search || b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search));

    filtered.sort((a, b) => {
      if (sortBy === "recent") return b.id - a.id;
      if (sortBy === "rating") return (b.rating || 0) - (a.rating || 0);
      if (sortBy === "title")  return a.title.localeCompare(b.title);
      if (sortBy === "author") return a.author.localeCompare(b.author);
    });

    const container = document.getElementById("grid-container");

    if (filtered.length === 0) {
      container.innerHTML = books.length === 0
        ? `<div class="empty">Sin libros aún. <span class="empty-link" onclick="showForm(null)">Agregar el primero →</span></div>`
        : `<div class="empty">Sin resultados para ese filtro.</div>`;
      return;
    }

    const st = STATUS;
    container.innerHTML = `<div class="grid">${filtered.map(book => `
      <div class="book-card" onclick="showDetail('${book.id}')">
        <div class="card-status">${st[book.status]?.icon || ""} ${st[book.status]?.label || ""}</div>
        <div class="card-title">${esc(book.title)}</div>
        <div class="card-author">${esc(book.author)}</div>
        ${book.rating ? `<div class="stars">${starsHtml(book.rating)}</div>` : ""}
        ${book.genre  ? `<div class="card-genre">${esc(book.genre)}</div>` : ""}
        ${book.review ? `<div class="card-snippet">"${esc(book.review.slice(0, 90))}${book.review.length > 90 ? "…" : ""}"</div>` : ""}
      </div>
    `).join("")}</div>`;
  }

  /* ── DETAIL ── */
  function showDetail(id) {
    const book = books.find(b => b.id == id);
    if (!book) return;
    currentId = id;

    const st = STATUS[book.status];

    // Cover
    const coverEl = document.getElementById("d-cover");
    coverEl.innerHTML = book.cover ? `<img src="${esc(book.cover)}" alt="" />` : "📖";

    document.getElementById("d-title").textContent  = book.title;
    document.getElementById("d-author").textContent = book.author;

    // Meta badges
    let meta = "";
    if (st)        meta += `<span class="badge">${st.icon} ${st.label}</span>`;
    if (book.genre) meta += `<span class="badge">${esc(book.genre)}</span>`;
    if (book.pages) meta += `<span class="badge">${esc(book.pages)} págs.</span>`;
    document.getElementById("d-meta").innerHTML = meta;

    // Stars
    document.getElementById("d-stars").innerHTML = book.rating ? starsHtml(book.rating, "") : "";

    // Dates
    let dates = "";
    if (book.startDate) dates += `Inicio: ${book.startDate}`;
    if (book.startDate && book.endDate) dates += "  ·  ";
    if (book.endDate)   dates += `Fin: ${book.endDate}`;
    document.getElementById("d-dates").textContent = dates;

    // Sections
    const showSec = (secId, contentId, content) => {
      const sec = document.getElementById(secId);
      if (content) {
        document.getElementById(contentId).textContent = content;
        sec.style.display = "block";
      } else {
        sec.style.display = "none";
      }
    };

    showSec("d-quote-section",  "d-quote",  book.quote);
    showSec("d-review-section", "d-review", book.review);
    showSec("d-notes-section",  "d-notes",  book.notes);

    const hasContent = book.quote || book.review || book.notes;
    document.getElementById("d-empty-section").style.display = hasContent ? "none" : "block";

    showView("detail");
  }

  /* ── FORM ── */
  function showForm(book) {
    formRating = book?.rating || 0;
    isEditing  = !!book;

    document.getElementById("form-heading").textContent  = book ? "Editar libro" : "Nuevo libro";
    document.getElementById("form-submit").textContent   = book ? "Guardar cambios" : "Agregar libro";
    document.getElementById("f-title").value  = book?.title  || "";
    document.getElementById("f-author").value = book?.author || "";
    document.getElementById("f-pages").value  = book?.pages  || "";
    document.getElementById("f-genre").value  = book?.genre  || "";
    document.getElementById("f-status").value = book?.status || "reading";
    document.getElementById("f-start").value  = book?.startDate || "";
    document.getElementById("f-end").value    = book?.endDate   || "";
    document.getElementById("f-quote").value  = book?.quote  || "";
    document.getElementById("f-review").value = book?.review || "";
    document.getElementById("f-notes").value  = book?.notes  || "";
    document.getElementById("f-cover").value  = book?.cover  || "";

    renderFormStars();
    showView("form");
  }

  function setRating(v) {
    formRating = formRating === v ? 0 : v;
    renderFormStars();
  }

  function renderFormStars() {
    document.querySelectorAll(".form-star").forEach(s => {
      s.classList.toggle("filled", parseInt(s.dataset.v) <= formRating);
    });
  }

  function editCurrent() {
    const book = books.find(b => b.id == currentId);
    if (book) showForm(book);
  }

  function cancelForm() {
    if (isEditing && currentId) showDetail(currentId);
    else showLibrary();
  }

  function submitForm() {
    const title  = document.getElementById("f-title").value.trim();
    const author = document.getElementById("f-author").value.trim();
    if (!title || !author) return;

    const data = {
      title,
      author,
      pages:     document.getElementById("f-pages").value.trim(),
      genre:     document.getElementById("f-genre").value,
      status:    document.getElementById("f-status").value,
      startDate: document.getElementById("f-start").value,
      endDate:   document.getElementById("f-end").value,
      rating:    formRating,
      quote:     document.getElementById("f-quote").value.trim(),
      review:    document.getElementById("f-review").value.trim(),
      notes:     document.getElementById("f-notes").value.trim(),
      cover:     document.getElementById("f-cover").value.trim(),
    };

    if (isEditing && currentId) {
      books = books.map(b => b.id == currentId ? { ...data, id: currentId } : b);
      persist();
      showDetail(currentId);
    } else {
      data.id = Date.now().toString();
      books = [data, ...books];
      persist();
      showLibrary();
    }
    updateStats();
  }

  /* ── DELETE ── */
  function deleteCurrent() {
    if (!confirm("¿Eliminar este libro?")) return;
    books = books.filter(b => b.id != currentId);
    currentId = null;
    persist();
    updateStats();
    showLibrary();
  }

  /* ── UTILS ── */
  function esc(str) {
    return String(str || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ── INIT ── */
  load();
</script>
</body>
</html>
